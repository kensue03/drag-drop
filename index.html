<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진짜 도파민을 찾아라! - 분류 게임</title>
    <style>
        :root {
            --bg-color: #fcfbf4; /* 연한 노란색 배경 (Canva 톤앤매너 반영) */
            --green-dark: #2d5a27;
            --green-light: #e8f0e6;
            --fake-color: #e74c3c;
            --real-color: #2ecc71;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        /* 헤더 레이아웃 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
            gap: 20px;
        }
        .title-area {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        h1 {
            color: var(--green-dark);
            margin: 0 0 5px 0;
            font-size: 2rem;
        }
        .subtitle {
            color: #666;
            margin: 0;
            font-size: 1.1rem;
        }
        /* 오디오 컨트롤 버튼 */
        .audio-btn {
            background-color: var(--green-dark);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .audio-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }
        .audio-btn:active {
            transform: scale(0.98);
        }
        .audio-btn.playing {
            background-color: #27ae60;
            animation: music-bounce 1s infinite alternate ease-in-out;
        }
        @keyframes music-bounce {
            0% { transform: translateY(0) scale(1.05); }
            100% { transform: translateY(-4px) scale(1.05); }
        }
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 15px;
            }
            .title-area {
                align-items: center;
            }
        }
        /* 게임 보드 레이아웃 */
        .game-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            gap: 20px;
        }
        /* 드롭 존 (바구니) 영역 */
        .zones-container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .zone {
            flex: 1;
            min-height: 200px;
            border: 3px dashed #ccc;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background-color: #fff;
            transition: all 0.3s ease;
        }
        .zone-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
        }
        #fake-zone.hover {
            background-color: #fde8e7;
            border-color: var(--fake-color);
        }
        #real-zone.hover {
            background-color: #eafaf1;
            border-color: var(--real-color);
        }
        .fake-title { background-color: var(--fake-color); }
        .real-title { background-color: var(--real-color); }
        /* 카드 배치 영역 */
        .card-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            border: 1px solid #ddd;
            min-height: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* 카드 스타일 */
        .card {
            background-color: var(--green-light);
            color: var(--green-dark);
            border: 2px solid var(--green-dark);
            padding: 12px 18px;
            border-radius: 25px;
            cursor: grab;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            max-width: 300px;
            text-align: center;
        }
        .card:active {
            cursor: grabbing;
            transform: scale(0.95);
        }
        .card.dragging {
            opacity: 0.5;
        }
        /* 분류 완료된 카드 스케일 다운 */
        .zone .card {
            max-width: 100%;
            width: 90%;
            font-size: 0.9rem;
            padding: 8px 12px;
            cursor: default;
            pointer-events: none; /* 정답 처리 후 드래그 방지 */
        }
        .fake-settled { background-color: #fde8e7 !important; border-color: var(--fake-color) !important; color: var(--fake-color) !important;}
        .real-settled { background-color: #eafaf1 !important; border-color: var(--real-color) !important; color: var(--real-color) !important;}
        /* 결과 메시지 팝업 */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 100;
            width: 80%;
            max-width: 400px;
        }
        .modal h2 { margin-top: 0; font-size: 1.8rem; }
        .modal p { font-size: 1.1rem; color: #55px; line-height: 1.5; }
        .modal button {
            background-color: var(--green-dark);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
        }
        .overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="title-area">
            <h1>🧠 "진짜 도파민"을 찾아라!</h1>
            <div class="subtitle">아래의 행동 카드를 알맞은 주머니에 드래그해서 넣어보세요!</div>
        </div>
        <button id="bgm-toggle-btn" class="audio-btn" onclick="soundManager.toggleBgm()">
            🔊 배경음악 켜기
        </button>
    </div>
    <div class="game-container">
        <!-- 바구니 영역 -->
        <div class="zones-container">
            <div id="fake-zone" class="zone" data-type="fake">
                <div class="zone-title fake-title">가짜 도파민 🛑</div>
            </div>
            <div id="real-zone" class="zone" data-type="real">
                <div class="zone-title real-title">진짜 도파민 ✨</div>
            </div>
        </div>
        <!-- 무작위 카드 풀 -->
        <div id="card-pool" class="card-pool"></div>
    </div>
    <!-- 알림 팝업 시스템 -->
    <div id="overlay" class="overlay"></div>
    <div id="modal" class="modal">
        <h2 id="modal-title">결과</h2>
        <p id="modal-desc"></p>
        <button onclick="closeModal()">확인</button>
    </div>
    <script>
        // Web Audio API 기반 오디오 시스템
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.bgmInterval = null;
                this.isPlayingBgm = false;
                this.melodyIndex = 0;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }
            playCorrect() {
                this.init();
                const now = this.ctx.currentTime;
                
                // 딩동댕~ 맑은 실로폰 소리 (도-미-솔-도)
                this.playTone(523.25, 'sine', now, 0.12, 0.15); // C5
                this.playTone(659.25, 'sine', now + 0.08, 0.12, 0.15); // E5
                this.playTone(783.99, 'sine', now + 0.16, 0.12, 0.15); // G5
                this.playTone(1046.50, 'sine', now + 0.24, 0.25, 0.20); // C6
            }
            playIncorrect() {
                this.init();
                const now = this.ctx.currentTime;
                
                // 낮고 둔탁한 띠로리~ 효과음
                const osc1 = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(180, now);
                osc1.frequency.linearRampToValueAtTime(120, now + 0.35);
                
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(185, now);
                osc2.frequency.linearRampToValueAtTime(125, now + 0.35);
                
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + 0.35);
                osc2.stop(now + 0.35);
            }
            playTone(freq, type, start, duration, volume) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, start);
                
                gain.gain.setValueAtTime(volume, start);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(start);
                osc.stop(start + duration);
            }
            toggleBgm() {
                this.init();
                if (this.isPlayingBgm) {
                    this.stopBgm();
                    document.getElementById('bgm-toggle-btn').innerHTML = '🔊 배경음악 켜기';
                    document.getElementById('bgm-toggle-btn').classList.remove('playing');
                } else {
                    this.startBgm();
                    document.getElementById('bgm-toggle-btn').innerHTML = '🔇 배경음악 끄기';
                    document.getElementById('bgm-toggle-btn').classList.add('playing');
                }
            }
            startBgm() {
                if (this.isPlayingBgm) return;
                this.isPlayingBgm = true;
                this.melodyIndex = 0;
                
                // 동요 느낌의 밝고 경쾌한 멜로디 (도미솔솔 라라솔~)
                const melody = [
                    261.63, 329.63, 392.00, 392.00, // 도 미 솔 솔
                    440.00, 440.00, 392.00, 0,      // 라 라 솔 (쉬고)
                    349.23, 349.23, 329.63, 329.63, // 파 파 미 미
                    293.66, 293.66, 261.63, 0       // 레 레 도 (쉬고)
                ];
                
                const tempo = 300; // 음표 간격 (ms)
                
                this.bgmInterval = setInterval(() => {
                    const now = this.ctx.currentTime;
                    const freq = melody[this.melodyIndex % melody.length];
                    
                    if (freq > 0) {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now);
                        
                        gain.gain.setValueAtTime(0.03, now); // 귀엽고 부드러운 오르골 볼륨
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
                        
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        
                        osc.start(now);
                        osc.stop(now + 0.3);
                        
                        // 4분음표마다 가벼운 베이스 반주 추가
                        if (this.melodyIndex % 4 === 0) {
                            this.playTone(freq / 2, 'sine', now, 0.6, 0.015);
                        }
                    }
                    
                    this.melodyIndex++;
                }, tempo);
            }
            stopBgm() {
                this.isPlayingBgm = false;
                if (this.bgmInterval) {
                    clearInterval(this.bgmInterval);
                    this.bgmInterval = null;
                }
            }
        }
        const soundManager = new SoundManager();
        // 사용자 첫 터치/클릭 상호작용 발생 시 AudioContext 활성화
        function autoInitAudio() {
            soundManager.init();
            document.removeEventListener('click', autoInitAudio);
            document.removeEventListener('touchstart', autoInitAudio);
            document.removeEventListener('dragstart', autoInitAudio);
        }
        document.addEventListener('click', autoInitAudio);
        document.addEventListener('touchstart', autoInitAudio);
        document.addEventListener('dragstart', autoInitAudio);
        // 1. 기획안의 10개 데이터 정의
        const itemData = [
            { text: "스마트폰으로 짧은 동영상(숏폼) 끝없이 넘겨보기", type: "fake" },
            { text: "어려운 수학 문제를 포기하지 않고 끝까지 풀어내기", type: "real" },
            { text: "수차례 시도 끝에 인형 뽑기 기계에서 인형 뽑기 성공하기", type: "fake" },
            { text: "줄넘기 2단 뛰기를 매일 연습해서 마침내 성공하기", type: "real" },
            { text: "내가 직접 계획을 세워서 방 청소 깔끔하게 끝내기", type: "real" },
            { text: "클릭 몇 번으로 쉽게 강력한 게임 아이템 사기", type: "fake" },
            { text: "용돈을 차곡차곡 모아서 갖고 싶던 물건 사기", type: "real" },
            { text: "자극적인 게임을 하며 밤새도록 컴퓨터 앞에 앉아있기", type: "fake" },
            { text: "피아노 곡이나 동아리 춤 연습을 해서 무대에서 멋지게 공연하기", type: "real" },
            { text: "SNS에 사진을 올리고 '좋아요' 알림만 계속 새로고침 하기", type: "fake" }
        ];
        const cardPool = document.getElementById('card-pool');
        const zones = document.querySelectorAll('.zone');
        let currentDragCard = null;
        let totalCardsCount = itemData.length;
        let correctCount = 0;
        // 2. 카드 무작위 섞기 (셔플 알고리즘)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        // 3. 게임 초기화 및 카드 생성
        function initGame() {
            cardPool.innerHTML = '';
            correctCount = 0;
            document.getElementById('fake-zone').innerHTML = '<div class="zone-title fake-title">가짜 도파민 🛑</div>';
            document.getElementById('real-zone').innerHTML = '<div class="zone-title real-title">진짜 도파민 ✨</div>';
            
            const shuffledData = shuffle([...itemData]);
            shuffledData.forEach((item, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.setAttribute('draggable', 'true');
                card.innerText = item.text;
                card.dataset.type = item.type;
                card.id = `card-${index}`;
                // 드래그 이벤트 리스너 등록
                card.addEventListener('dragstart', dragStart);
                card.addEventListener('dragend', dragEnd);
                // 모바일 터치 대응을 위한 기본 터치 이벤트 설정 (필요시 복합 라이브러리 사용 권장하나 기본 탑재)
                card.addEventListener('touchstart', handleTouchStart, {passive: true});
                cardPool.appendChild(card);
            });
        }
        // 4. 드래그 앤 드롭 핵심 로직
        function dragStart() {
            currentDragCard = this;
            this.classList.add('dragging');
        }
        function dragEnd() {
            this.classList.remove('dragging');
        }
        zones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); // 드롭 허용
            });
            zone.addEventListener('dragenter', function() {
                this.classList.add('hover');
            });
            zone.addEventListener('dragleave', function() {
                this.classList.remove('hover');
            });
            zone.addEventListener('drop', function() {
                this.classList.remove('hover');
                if (!currentDragCard) return;
                const cardType = currentDragCard.dataset.type;
                const zoneType = this.dataset.type;
                // 정답 검증
                if (cardType === zoneType) {
                    // 성공 피드백 연출 및 효과음 재생
                    soundManager.playCorrect();
                    currentDragCard.removeAttribute('draggable');
                    if(zoneType === 'fake') {
                        currentDragCard.classList.add('fake-settled');
                    } else {
                        currentDragCard.classList.add('real-settled');
                    }
                    this.appendChild(currentDragCard);
                    
                    showModal("🎉 정답입니다!", 
                        zoneType === 'fake' 
                        ? "정답! 노력 없이 얻는 짜릿함은 금방 사라지고 우리 뇌를 지치게 만들어요!" 
                        : "딩동댕! 스스로 땀 흘려 얻은 성취감은 우리의 뇌와 마음을 튼튼하게 성장시켜요!"
                    );
                    correctCount++;
                    
                    // 모든 카드를 맞춘 경우 게임 클리어
                    if(correctCount === totalCardsCount) {
                        setTimeout(() => {
                            showModal("🏆 미션 클리어!", "모든 도파민 카드를 완벽하게 구별해냈어요! 이제 일상에서도 진짜 도파민을 채우는 멋진 어린이가 되어봐요!");
                        }, 800);
                    }
                } else {
                    // 오답 피드백 연출 및 효과음 재생
                    soundManager.playIncorrect();
                    showModal("😢 앗, 다시 생각해 볼까요?", "이 행동은 진짜 나를 성장시키는 행동일까요, 아니면 순간의 짜릿함뿐일까요?");
                }
                currentDragCard = null;
            });
        });
        // 5. 알림창(모달) 제어
        function showModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }
        // 모바일 환경을 위한 간단한 터치 안내 기능 (PC 마우스 드래그 최적화 기준)
        function handleTouchStart() {
            // 모바일 환경 하이브리드 대응을 고도화하려면 터치 좌표 이동 로직이 추가로 요구됩니다.
            // 본 데모는 학교 PC 및 전자칠판/마우스 환경에 최적화되어 있습니다.
        }
        // 게임 시작 실행
        initGame();
    </script>
</body>
</html>
